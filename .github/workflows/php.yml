name: LibxaFrame CI Suite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.3]

    name: P${{ matrix.php }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: 🛡️ Security Audit
        run: composer audit

      - name: 🔍 Static Analysis (PHPStan)
        run: vendor/bin/phpstan analyse src --level=5

      - name: 👕 Linting (PHP_CodeSniffer)
        run: vendor/bin/phpcs src --standard=PSR12 --ignore=vendor/*

      - name: 🧪 Unit Tests (PHPUnit)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_KEY: base64:t28Z0M8k6X9... # Testing key
        run: vendor/bin/phpunit tests --display-deprecations --display-warnings

      - name: 🧪 Validate Fiber Concurrency
        run: vendor/bin/phpunit tests/FiberParallelTest.php

      - name: 🧪 Validate Zero-Config Tenancy
        run: vendor/bin/phpunit tests/TenancyTest.php
